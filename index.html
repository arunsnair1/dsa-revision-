<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Spaced Repetition Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>DSA Revision Tracker</h1>
      <div class="header-info">
        <span id="current-date"></span>
        <span id="countdown" class="countdown"></span>
      </div>
    </div>
  </header>

  <nav class="nav">
    <div class="nav-links">
      <button data-view="dashboard" class="active">Dashboard</button>
      <button data-view="questions">Question Bank</button>
      <button data-view="progress">Progress</button>
      <button data-view="settings">Settings</button>
    </div>
  </nav>

  <main class="main">
    <!-- Dashboard View -->
    <div id="view-dashboard" class="view active">
      <!-- Timer Section -->
      <div id="timer-section" class="timer-section">
        <div class="timer-display">
          <span id="timer-value">00:00:00</span>
        </div>
        <div id="timer-setup" class="timer-setup">
          <label class="timer-label">
            <input type="number" id="timer-hours" min="0" max="10" value="3" class="timer-input">
            <span>h</span>
          </label>
          <label class="timer-label">
            <input type="number" id="timer-minutes" min="0" max="59" value="0" class="timer-input">
            <span>m</span>
          </label>
        </div>
        <div class="timer-controls">
          <button id="timer-start-btn" class="btn btn-primary btn-sm">Start</button>
          <button id="timer-pause-btn" class="btn btn-warning btn-sm" style="display:none">Pause</button>
          <button id="timer-resume-btn" class="btn btn-success btn-sm" style="display:none">Play</button>
          <button id="timer-reset-btn" class="btn btn-ghost btn-sm">Reset</button>
        </div>
      </div>
      <div id="dashboard-content"></div>
    </div>

    <!-- Question Bank View -->
    <div id="view-questions" class="view">
      <div id="questions-content"></div>
    </div>

    <!-- Progress View -->
    <div id="view-progress" class="view">
      <div id="progress-content"></div>
    </div>

    <!-- Settings View -->
    <div id="view-settings" class="view">
      <div class="section-title">Settings</div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Daily Time Budget (minutes)</div>
          <div class="setting-description">Maximum study time per day</div>
        </div>
        <input type="number" id="budget-input" min="30" max="480" value="180">
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Deadline</div>
          <div class="setting-description">Target completion date</div>
        </div>
        <input type="date" id="deadline-input" value="2025-06-25">
      </div>

      <div class="section-title" style="margin-top:2rem">Export / Import Data</div>

      <div class="card">
        <textarea id="import-export-area" placeholder="Click Export to see your data, or paste JSON here to import..."></textarea>
        <div style="margin-top:0.75rem;display:flex;gap:0.5rem">
          <button id="export-btn" class="btn btn-primary">Export</button>
          <button id="import-btn" class="btn btn-ghost">Import</button>
        </div>
      </div>

      <div class="section-title" style="margin-top:2rem">Danger Zone</div>

      <div class="card" style="border-color:var(--danger)">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem">
          <div>
            <div class="setting-label">Reset All Data</div>
            <div class="setting-description">Permanently delete all progress and revision history</div>
          </div>
          <button id="reset-btn" class="btn btn-danger">Reset Everything</button>
        </div>
      </div>

      <div class="section-title" style="margin-top:2rem">Revision History</div>
      <div class="card">
        <div id="history-log"></div>
      </div>
    </div>
  </main>

  <!-- Confirmation Modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h3>Confirm Action</h3>
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-danger">Confirm</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
